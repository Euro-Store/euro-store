[build]
  command    = "npm install && npx next build"
  publish    = ".next"

[build.environment]
  NODE_VERSION = "20"
  NODE_ENV     = "production"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"